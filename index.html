<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易經卜卦學習 App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">

    <style>
        /* --- 基礎版面與美化樣式 (預設淺色模式) --- */
        body { 
            font-family: "微軟正黑體", sans-serif; 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 20px; 
            line-height: 1.6; 
            background-color: #f4f4f4;
            color: #333;
            transition: background-color 0.3s, color 0.3s; 
        }
        h1 { text-align: center; color: #2c3e50; margin-top: 10px; transition: color 0.3s; }
        .header-icon { font-size: 50px; text-align: center; color: #d4af37; margin-bottom: -15px; }

        .control-panel { 
            background: #fff; padding: 20px; border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; 
            margin-bottom: 20px; border-top: 5px solid #d4af37; transition: background-color 0.3s;
        }
        select, button { font-size: 16px; padding: 10px; margin: 10px 5px; border-radius: 5px; box-sizing: border-box; }
        select { width: 80%; border: 1px solid #ccc; }
        button { cursor: pointer; background-color: #2c3e50; color: white; border: none; font-weight: bold; width: 80%; transition: background 0.3s; }
        button:hover { background-color: #34495e; }
        
        .result-panel { 
            background: #fff; padding: 25px; border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: none; 
            margin-bottom: 30px; transition: background-color 0.3s;
        }
        .section-title { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 8px; margin-top: 0; transition: color 0.3s; }
        
        /* 卦象圖形樣式 */
        .hexagram-box { display: flex; flex-direction: column; width: 80px; margin: 15px auto; gap: 6px; }
        .yao { height: 12px; display: flex; justify-content: space-between; }
        .yang { background-color: #2c3e50; width: 100%; transition: background-color 0.3s; }
        .yin-part { background-color: #2c3e50; width: 45%; transition: background-color 0.3s; }
        .changing-yao .yang, .changing-yao .yin-part { background-color: #e74c3c; }

        /* --- 📝 解說文字標示樣式 (淺色模式：白底黑字) --- */
        .interp-box { background-color: #fcf8e3; padding: 15px; border-radius: 5px; margin-top: 20px; transition: background-color 0.3s; }
        .interp-title { margin-top: 0; color: #8a6d3b; transition: color 0.3s; }
        
        .highlight-main {
            background-color: #fdf2f2; /* 極淺的紅底 */
            border-left: 5px solid #e74c3c;
            padding: 12px 15px;
            margin: 12px 0;
            border-radius: 0 5px 5px 0;
            color: #111111; /* 【關鍵】極深色，確保古文清晰 */
            font-size: 1.15em;
            font-weight: bold;
            line-height: 1.5;
        }
        .highlight-main .ref-title {
            color: #c0392b; /* 提示字維持紅色 */
            font-size: 0.85em;
            display: block;
            margin-bottom: 5px;
        }
        .highlight-aux {
            color: #333333; /* 淺色模式的輔助字也加深 */
            font-size: 1em;
            margin-left: 10px;
            border-left: 3px solid #bdc3c7;
            padding-left: 12px;
        }

        .app-footer { text-align: center; margin-top: 40px; padding-top: 15px; border-top: 1px solid #ddd; color: #7f8c8d; font-size: 0.9em; line-height: 1.8; transition: border-color 0.3s; }

        /* --- 📱 深色模式 (Dark Mode) 支援 (黑底白字) --- */
        @media (prefers-color-scheme: dark) {
            body { background-color: #121212; color: #e0e0e0; }
            h1, .section-title { color: #d4af37; border-bottom: 2px solid #333; }
            .control-panel, .result-panel { background: #1e1e1e; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border-top: 5px solid #d4af37; }
            select { background-color: #2c2c2c; color: #fff; border: 1px solid #444; }
            button { background-color: #d4af37; color: #121212; }
            button:hover { background-color: #b5952f; }
            
            .yang, .yin-part { background-color: #ecf0f1; }
            .changing-yao .yang, .changing-yao .yin-part { background-color: #ff5252; }

            .interp-box { background-color: #2a2a2a !important; }
            .interp-title { color: #d4af37; }
            
            .highlight-main {
                background-color: rgba(231, 76, 60, 0.15); /* 微微的暗紅底透光 */
                border-left: 5px solid #ff5252;
                color: #ffffff; /* 【關鍵】純白色，在深色背景下絕對清晰 */
            }
            .highlight-main .ref-title {
                color: #ffca28; /* 提示字改用明亮的金黃色 */
            }
            .highlight-aux {
                color: #e0e0e0; /* 輔助字改為亮淺灰色 */
                border-left: 3px solid #7f8c8d;
            }
            .app-footer { border-top: 1px solid #333; }
        }
    </style>
</head>
<body>

    <div class="header-icon">☯</div>
    <h1>易經卜卦學習</h1>

    <div class="control-panel">
        <label for="method-select"><strong>請選擇起卦方式：</strong></label><br>
        <select id="method-select">
            <option value="coin">金錢卦 (機率對稱)</option>
            <option value="yarrow">蓍草卦 / 大衍之數 (古法機率)</option>
        </select>
        <br>
        <button id="divine-btn">誠心默念問題後，點此起卦</button>
    </div>

    <div id="result-panel" class="result-panel">
        <div>
            <h2 class="section-title">本卦：<span id="orig-name">--</span></h2>
            <div id="orig-pic"></div>
            <p><strong>卦辭：</strong> <span id="orig-guaci">--</span></p>
        </div>
        
        <div id="interp-top" class="interp-box" style="display:none;"></div>

        <div style="margin-top: 20px;">
            <h2 class="section-title">之卦：<span id="trans-name">--</span></h2>
            <div id="trans-pic"></div>
            <p><strong>卦辭：</strong> <span id="trans-guaci">--</span></p>
        </div>

        <div id="interp-bottom" class="interp-box" style="display:none;"></div>
    </div>

    <div class="app-footer">
        <div>作者：臺北市立建國高級中學圖書館 潘威歷 主任</div>
        <div>更新日期：2026年3月2日</div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => console.log('ServiceWorker 註冊成功！', registration.scope))
                    .catch(err => console.log('ServiceWorker 註冊失敗：', err));
            });
        }
    </script>
    <script src="data.js"></script>
    <script src="app.js"></script>

</body>
</html>
