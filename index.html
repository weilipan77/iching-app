<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易經卜卦學習 App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">

    <style>
        /* --- 基礎版面與美化樣式 --- */
        body { 
            font-family: "微軟正黑體", sans-serif; 
            max-width: 600px; /* 適合手機與平板閱讀的寬度 */
            margin: 0 auto; 
            padding: 20px; 
            line-height: 1.6; 
            background-color: #f4f4f4;
            color: #333;
        }
        h1 { 
            text-align: center; 
            color: #2c3e50;
            margin-top: 10px;
        }
        .header-icon {
            font-size: 50px;
            text-align: center;
            color: #d4af37; /* 金色太極圖騰 */
            margin-bottom: -15px;
        }

        .control-panel { 
            background: #fff; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center; 
            margin-bottom: 20px; 
            border-top: 5px solid #d4af37;
        }
        select, button { 
            font-size: 16px; 
            padding: 10px; 
            margin: 10px 5px; 
            border-radius: 5px;
            box-sizing: border-box;
        }
        select {
            width: 80%;
            border: 1px solid #ccc;
        }
        button { 
            cursor: pointer; 
            background-color: #2c3e50; 
            color: white; 
            border: none; 
            font-weight: bold;
            width: 80%;
            transition: background 0.3s;
        }
        button:hover { background-color: #34495e; }
        
        .result-panel { 
            background: #fff;
            padding: 25px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: none; /* 初始狀態隱藏，算出結果後再顯示 */
            margin-bottom: 30px;
        }
        .section-title { 
            color: #2c3e50; 
            border-bottom: 2px solid #eee; 
            padding-bottom: 8px; 
            margin-top: 0;
        }
        
        /* --- 易經卦象圖形樣式 --- */
        .hexagram-box {
            display: flex;
            flex-direction: column; /* 讓六個爻由上往下排 */
            width: 80px;
            margin: 15px auto; /* 置中對齊 */
            gap: 6px; /* 爻與爻之間的間距 */
        }
        .yao {
            height: 12px; /* 每一個爻的粗細 */
            display: flex;
            justify-content: space-between;
        }
        /* 陽爻：一條連貫的實線 */
        .yang {
            background-color: #2c3e50;
            width: 100%;
        }
        /* 陰爻：斷開的兩條短線，中間留空 */
        .yin-part {
            background-color: #2c3e50;
            width: 45%; /* 左右各佔 45%，中間自動留白 10% */
        }
        /* 特別標示動爻（變成紅色的） */
        .changing-yao .yang, .changing-yao .yin-part {
            background-color: #e74c3c;
        }

        /* 作者資訊頁尾樣式 */
        .app-footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            color: #7f8c8d;
            font-size: 0.9em;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="header-icon">☯</div>
    <h1>易經卜卦學習</h1>

    <div class="control-panel">
        <label for="method-select"><strong>請選擇起卦方式：</strong></label><br>
        <select id="method-select">
            <option value="coin">金錢卦 (機率對稱)</option>
            <option value="yarrow">蓍草卦 / 大衍之數 (古法機率)</option>
        </select>
        <br>
        <button id="divine-btn">誠心默念問題後，點此起卦</button>
    </div>

    <div id="result-panel" class="result-panel">
        
        <div>
            <h2 class="section-title">本卦：<span id="orig-name">--</span></h2>
            <div id="orig-pic"></div>
            <p><strong>卦辭：</strong> <span id="orig-guaci">--</span></p>
        </div>
        
        <div id="interp-top" style="display:none; margin-top: 20px; background-color: #fcf8e3; padding: 15px; border-radius: 5px;">
        </div>

        <div style="margin-top: 20px;">
            <h2 class="section-title">之卦：<span id="trans-name">--</span></h2>
            <div id="trans-pic"></div>
            <p><strong>卦辭：</strong> <span id="trans-guaci">--</span></p>
        </div>

        <div id="interp-bottom" style="display:none; margin-top: 20px; background-color: #fcf8e3; padding: 15px; border-radius: 5px;">
        </div>

    </div>

    <div class="app-footer">
        <div>作者：臺北市立建國高級中學圖書館 潘威歷 主任</div>
        <div>更新日期：2026年3月2日</div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker 註冊成功！', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker 註冊失敗：', err);
                    });
            });
        }
    </script>

    <script src="data.js"></script>
    
    <script src="app.js"></script>

</body>
</html>
